<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ARGUS COMMAND CENTER</title>
    <style>
        :root { --bg: #020617; --card: #0f172a; --cyan: #22d3ee; --pink: #f472b6; --green: #4ade80; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #1e293b; padding-bottom: 20px; }
        .logo span { color: var(--cyan); }
        .dashboard-grid { display: grid; grid-template-columns: 280px 1fr 280px; gap: 20px; }
        .glass-card { background: var(--card); border: 1px solid #1e293b; border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        .metric { font-size: 36px; font-weight: bold; transition: all 0.5s; }
        .main-display { background: rgba(15, 23, 42, 0.4); border: 2px dashed #1e293b; border-radius: 30px; height: 400px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .argus-sprout { position: absolute; inset: 20px; background: rgba(34, 211, 238, 0.05); border: 1px solid var(--cyan); border-radius: 25px; padding: 40px; display: none; flex-direction: column; justify-content: center; animation: sprout 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes sprout { 0% { transform: scale(0.8) translateY(40px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
        .type-label { color: var(--pink); font-weight: bold; font-size: 12px; margin-bottom: 15px; display: block; }
        .status-box { display: flex; align-items: center; gap: 10px; font-size: 12px; }
        .dot { width: 10px; height: 10px; background: #22d3ee; border-radius: 50%; box-shadow: 0 0 10px #22d3ee; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><h1>ARGUS <span>COMMAND</span></h1></div>
        <div class="status-box"><div class="dot"></div><span id="st-text" style="color:#22d3ee">IA CONNECTED</span></div>
    </div>
    <div class="dashboard-grid">
        <div class="side">
            <div class="glass-card"><span class="label">Probabilidade</span><div id="prob" class="metric" style="color:var(--cyan)">50%</div></div>
            <div class="glass-card"><span class="label">Volume de Dados</span><div id="volume" class="metric" style="color:white; font-size:24px;">0 frases</div></div>
            <button onclick="startListening()" style="width: 100%; background: var(--cyan); border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer;">LIGAR ESCUTA ATIVA</button>
        </div>
        <div class="main-display">
            <div id="loader" style="color: #475569;">Aguardando áudio...</div>
            <div id="card" class="argus-sprout"><span id="tipo" class="type-label"></span><div id="texto" style="font-size:22px; font-weight:500;"></div></div>
        </div>
        <div class="side">
            <div class="glass-card" style="min-height: 200px;"><span class="label">Histórico</span><ul id="history" style="font-size: 12px; color: #94a3b8; padding-left: 15px;"></ul></div>
        </div>
    </div>
    <script>
        const socket = new WebSocket('wss://super-disco-4jrvpvxp64j7hj99g-8765.app.github.dev');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'pt-BR'; recognition.continuous = true; recognition.interimResults = true;

        function startListening() { recognition.start(); document.getElementById('loader').innerText = "ARGUS ouvindo..."; }

        recognition.onresult = (event) => {
            let current = event.results[event.results.length - 1].transcript.toLowerCase();
            if (event.results[event.results.length - 1].isFinal) socket.send(JSON.stringify({ texto_falado: current }));
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const probEl = document.getElementById('prob');
            probEl.innerText = data.prob + "%";
            probEl.style.color = data.prob > 70 ? "#4ade80" : (data.prob < 40 ? "#f87171" : "#22d3ee");
            document.getElementById('volume').innerText = data.total_frases + " frases";

            if (data.tipo) {
                const card = document.getElementById('card');
                document.getElementById('loader').style.display = 'none';
                card.style.display = 'flex';
                document.getElementById('tipo').innerText = data.tipo;
                document.getElementById('texto').innerText = data.texto;
                let li = document.createElement('li'); li.innerText = data.tipo;
                document.getElementById('history').prepend(li);
                card.style.animation = 'none'; card.offsetHeight; card.style.animation = null;
            }
        };
    </script>
</body>
</html>
